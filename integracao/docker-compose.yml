version: '3.8'

# Stand1 Produções — Stack de integração WhatsApp
# Serviços: Evolution API + n8n + PostgreSQL + Redis + Bridge + Nginx
#
# Uso:
#   cp .env.example .env      # preencher variáveis
#   docker compose up -d
#   docker compose logs -f

services:

  # ── REDIS (fila interna da Evolution API) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - s1net

  # ── POSTGRESQL (banco do n8n) ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DB:-n8n}
      POSTGRES_USER:     ${PG_USER:-n8n}
      POSTGRES_PASSWORD: ${PG_PASS:-s1n8npass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - s1net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── EVOLUTION API (conexão WhatsApp) ──────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_URL:             https://${DOMAIN}/wpp
      AUTHENTICATION_TYPE:    apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_KEY:-s1evo_change_me}
      DATABASE_ENABLED:       'false'
      REDIS_ENABLED:          'true'
      REDIS_URI:              redis://redis:6379
      WEBHOOK_GLOBAL_ENABLED: 'false'
      LOG_LEVEL:              ERROR
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - redis
    networks:
      - s1net

  # ── N8N (orquestrador de workflows) ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST:               ${DOMAIN}
      N8N_PORT:               5678
      N8N_PROTOCOL:           https
      WEBHOOK_URL:            https://${DOMAIN}/n8n/
      N8N_PATH:               /n8n/
      DB_TYPE:                postgresdb
      DB_POSTGRESDB_HOST:     postgres
      DB_POSTGRESDB_DATABASE: ${PG_DB:-n8n}
      DB_POSTGRESDB_USER:     ${PG_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${PG_PASS:-s1n8npass}
      N8N_ENCRYPTION_KEY:     ${N8N_KEY:-s1n8n_enc_change_me}
      N8N_BASIC_AUTH_ACTIVE:  'true'
      N8N_BASIC_AUTH_USER:    ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASS:-stand1admin}
      GENERIC_TIMEZONE:       America/Bahia
      TZ:                     America/Bahia
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - s1net

  # ── BRIDGE (servidor Node.js: recebe do n8n, serve pro dashboard) ──────────
  bridge:
    build: ./bridge
    restart: unless-stopped
    environment:
      PORT:         3000
      BRIDGE_TOKEN: ${BRIDGE_TOKEN:-s1bridge_change_me}
    volumes:
      - bridge_data:/app/data
    networks:
      - s1net

  # ── NGINX (reverse proxy + HTTPS + servir o dashboard) ────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ../stand1_dashboard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - evolution
      - n8n
      - bridge
    networks:
      - s1net

  # ── CERTBOT (certificado SSL gratuito Let's Encrypt) ──────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet;
             sleep 12h & wait $${!}; done"

volumes:
  redis_data:
  pg_data:
  n8n_data:
  evolution_data:
  bridge_data:
  certbot_www:

networks:
  s1net:
    driver: bridge
