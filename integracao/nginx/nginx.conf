events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    server_name stand1.vps-kinghost.net;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name stand1.vps-kinghost.net;

    ssl_certificate     /etc/letsencrypt/live/stand1.vps-kinghost.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stand1.vps-kinghost.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      root  /usr/share/nginx/html;
      index index.html;
      add_header Cache-Control "no-cache";
    }

    location /api/ {
      proxy_pass         http://bridge:3000/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }
}
